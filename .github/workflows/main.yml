name: Generate Rules
on:
  workflow_dispatch: # Оставляем ТОЛЬКО ручной запуск

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download and Clean
        run: |
          # Скачиваем оригинал, удаляем пробелы, мусор и пустые строки
          curl -sL https://raw.githubusercontent.com/itdoginfo/allow-domains/main/Services/youtube.lst | sed 's/[[:space:]]//g' | grep -v '^$' > youtube.txt

      - name: Create YAML format
        run: |
          echo "payload:" > youtube.yaml
          sed "s/^/  - '/;s/$/'/" youtube.txt >> youtube.yaml

      - name: Install Mihomo and Convert to MRS
        run: |
          # Качаем актуальный бинарник для конвертации
          curl -L -o mihomo.tar.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.18.9/mihomo-linux-amd64-v1.18.9.tar.gz
          tar -xzf mihomo.tar.gz
          chmod +x mihomo
          # Генерируем бинарный файл MRS
          ./mihomo convert-ruleset domain text youtube.txt youtube.mrs

      - name: Push changes
        run: |
          git config --global user.name "Dron3d-Bot"
          git config --global user.email "action@github.com"
          # Сохраняем и YAML, и MRS в твой репозиторий
          git add youtube.yaml youtube.mrs
          git commit -m "Manual update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
