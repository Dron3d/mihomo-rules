name: Generate Rules
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download and Clean
        run: |
          # Скачиваем оригинал, удаляем пробелы и пустые строки
          curl -sL https://raw.githubusercontent.com/itdoginfo/allow-domains/main/Services/youtube.lst | sed 's/[[:space:]]//g' | grep -v '^$' > youtube.txt

      - name: Create YAML format
        run: |
          echo "payload:" > youtube.yaml
          sed "s/^/  - '/;s/$/'/" youtube.txt >> youtube.yaml

      - name: Install Mihomo and Convert to MRS
        run: |
          # Автоматически находим ссылку на последний релиз для linux-amd64
          LATEST_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep "browser_download_url.*linux-amd64-v.*tar.gz" | head -n 1 | cut -d '"' -f 4)
          echo "Downloading from: $LATEST_URL"
          curl -L -o mihomo.tar.gz "$LATEST_URL"
          
          # Распаковываем
          tar -xzf mihomo.tar.gz
          # Файл внутри может называться по-разному, находим его и переименовываем в 'mihomo'
          mv mihomo-linux-amd64* mihomo 2>/dev/null || mv ./mihomo-linux-amd64 ./mihomo 2>/dev/null
          chmod +x mihomo
          
          # Конвертируем
          ./mihomo convert-ruleset domain text youtube.txt youtube.mrs

      - name: Push changes
        run: |
          git config --global user.name "Dron3d-Bot"
          git config --global user.email "action@github.com"
          git add youtube.yaml youtube.mrs
          git commit -m "Manual update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
